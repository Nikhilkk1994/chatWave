<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | ChatWave</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        body { min-height: 100vh; background: linear-gradient(135deg, #e0e7ff 0%, #f8fafc 100%); display: flex; align-items: center; justify-content: center; }
        .signup-card { background: #fff; border-radius: 16px; box-shadow: 0 8px 32px rgba(60,60,100,0.12); padding: 40px 32px 32px 32px; max-width: 350px; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .signup-card h1 { margin: 0 0 8px 0; font-size: 2rem; font-weight: 700; color: #2c2f33; }
        .signup-card p { margin: 0 0 24px 0; color: #6b7280; font-size: 1rem; }
        .signup-card label { align-self: flex-start; margin-bottom: 4px; color: #374151; font-size: 1rem; font-weight: 500; }
        .signup-card input { width: 100%; padding: 12px 14px; margin-bottom: 18px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 1rem; background: #f9fafb; transition: border 0.2s; }
        .signup-card input:focus { border: 1.5px solid #529a8b; outline: none; background: #fff; }
        .signup-card button { width: 100%; padding: 12px 0; background: #529a8b; color: #fff; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .signup-card button:hover { background: #417f73; }
    </style>
</head>
<body>
    <main>
        <form class="signup-card" id="signupForm" autocomplete="off">
            <h1>Sign Up for ChatWave</h1>
            <p>Create your free ChatWave account and join the conversation. It's fast, easy, and secure!</p>
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Username" required autocomplete="off">
            <label for="age">Age</label>
            <input type="number" id="age" name="age" placeholder="Age" required min="1" max="120" autocomplete="off">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Password" required autocomplete="off">
            <button type="submit">Sign Up</button>
        </form>
    </main>
    <script>
      document.getElementById('signupForm').addEventListener('submit', function(e) {
        e.preventDefault();
        // Add your signup logic here
        alert('Signup submitted!');
      });
    </script>
</body>
</html>
